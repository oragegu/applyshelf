<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}ApplyShelf{% endblock %}</title>
    <style>
        body {
            margin: 0;
            font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            color: #1f2937;
            background: #f8fafc;
        }

        header {
            background: #ffffff;
            border-bottom: 1px solid #e5e7eb;
        }

        nav,
        main {
            max-width: 960px;
            margin: 0 auto;
            padding: 1rem;
        }

        nav {
            display: flex;
            gap: 1rem;
            align-items: center;
        }

        nav a,
        a {
            color: #075985;
            text-decoration: none;
        }

        nav a:hover,
        a:hover {
            text-decoration: underline;
        }

        .brand {
            font-weight: 700;
            color: #111827;
            margin-right: auto;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 1rem;
        }

        .card,
        .panel {
            background: #ffffff;
            border: 1px solid #e5e7eb;
            border-radius: 8px;
            padding: 1rem;
        }

        .muted {
            color: #6b7280;
        }

        .actions,
        .filters {
            display: flex;
            gap: 0.75rem;
            flex-wrap: wrap;
            align-items: end;
        }

        label {
            display: grid;
            gap: 0.25rem;
            font-weight: 600;
            font-size: 0.9rem;
        }

        input,
        select,
        button {
            font: inherit;
            border: 1px solid #cbd5e1;
            border-radius: 6px;
            padding: 0.5rem 0.6rem;
            background: #ffffff;
        }

        button {
            cursor: pointer;
            color: #ffffff;
            background: #075985;
            border-color: #075985;
        }

        .snippet-content {
            white-space: pre-wrap;
            background: #f1f5f9;
            border-radius: 8px;
            padding: 1rem;
        }
    </style>
</head>
<body>
    <header>
        <nav>
            <a class="brand" href="{% url 'applications:dashboard' %}">ApplyShelf</a>
            <a href="{% url 'applications:snippet_list' %}">Snippets</a>
            <a href="{% url 'admin:index' %}">Admin</a>
        </nav>
    </header>
    <main>
        {% block content %}{% endblock %}
    </main>
    <script>
        document.addEventListener("click", async (event) => {
            const button = event.target.closest("[data-copy-target]");
            if (!button) {
                return;
            }

            const target = document.querySelector(button.dataset.copyTarget);
            if (!target) {
                return;
            }

            await navigator.clipboard.writeText(target.innerText);
            const originalText = button.innerText;
            button.innerText = "Copied";
            setTimeout(() => {
                button.innerText = originalText;
            }, 1200);
        });
    </script>
</body>
</html>
